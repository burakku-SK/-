<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>濡羽の家計管理</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f0f2f5; font-size: 14px; }
        .header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 10px; }
        .info-box { background: #fff; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .status-card { background: #e3f2fd; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #bbdefb; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin: 10px 0; }
        .cell { background: #fff; padding: 5px; text-align: center; border: 1px solid #ddd; height: 40px; cursor: pointer; position: relative; }
        .cell-danger { background-color: #ffcdd2 !important; border: 2px solid #e53935; }
        .controls { background: #fff; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        input { padding: 5px; margin-bottom: 5px; width: 90%; }
        button { padding: 8px; border-radius: 4px; border: none; background: #2196f3; color: white; cursor: pointer; width: 100%; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 0.9em; }
        th, td { border: 1px solid #ddd; padding: 5px; text-align: center; }
        .list-item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 5px 0; font-size: 0.9em; }
        .chart-wrapper { height: 250px; background: #fff; padding: 10px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <button onclick="changeMonth(-1)" style="width: auto;">◀ 前月</button>
        <div id="currentMonth"></div>
        <button onclick="changeMonth(1)" style="width: auto;">翌月 ▶</button>
    </div>

    <div class="status-card">
        <div style="font-size: 0.8em; color: #555;">目標金額: <input type="number" id="targetGoal" onchange="saveAll()" style="width:80px; font-size:1em;">円</div>
        <div style="font-size: 0.8em; color: #555;">1日の危険ライン: <input type="number" id="dangerThreshold" onchange="saveAll()" style="width:80px; font-size:1em;">円</div>
        <div id="totalStatus" style="font-weight:bold; font-size: 1.2em; color:#1976d2; margin-top:5px;"></div>
    </div>

    <div class="info-box">
        <strong>月間収支管理</strong>
        <table>
            <tr><th>項目</th><th>金額</th></tr>
            <tr><td>収入</td><td><input type="number" id="monthlyIncome" style="width:80px"></td></tr>
            <tr><td>固定費</td><td><input type="number" id="monthlyFixed" style="width:80px"></td></tr>
            <tr><td><strong>予算設定</strong></td><td><input type="number" id="monthlyBudget" style="width:80px"></td></tr>
        </table>
        <div id="monthlyBudgetStatus" style="font-weight: bold; color: #d32f2f; margin-top:5px;"></div>
        <button onclick="saveMonthlyData()" style="background:#4caf50">収支・予算を保存</button>
    </div>

    <div class="calendar-grid" id="calendar"></div>

    <div class="controls">
        <div id="selectedDateTitle" style="font-weight:bold; margin-bottom:5px;">日付を選択してください</div>
        <input type="text" id="itemName" placeholder="項目名 (例: 食費, コンビニ)">
        <input type="number" id="amount" placeholder="金額(円)">
        <button onclick="addExpense()" style="background:#4caf50">追加</button>
        <div id="expenseList" style="margin-top:10px;"></div>
    </div>

    <div class="chart-wrapper">
        <canvas id="myChart"></canvas>
    </div>

    <script>
        let cur = new Date();
        let dailyExpenses = JSON.parse(localStorage.getItem('dailyExpenses')) || {};
        let monthlyPlans = JSON.parse(localStorage.getItem('monthlyPlans')) || {};
        let config = JSON.parse(localStorage.getItem('myConfig')) || { targetGoal: 2500000, dangerThreshold: 3000 };
        let selectedDate = new Date().toISOString().split('T')[0];
        let myChart = null;

        function render() {
            document.getElementById('targetGoal').value = config.targetGoal;
            document.getElementById('dangerThreshold').value = config.dangerThreshold || 3000;
            
            const y = cur.getFullYear(), m = cur.getMonth();
            const monthKey = `${y}-${(m+1).toString().padStart(2,'0')}`;
            document.getElementById('currentMonth').innerText = `${y}年 ${m + 1}月`;
            document.getElementById('selectedDateTitle').innerText = `${selectedDate} の支出`;

            // 総資産計算
            let totalIncome = 0; let totalFixed = 0; let totalDaily = 0;
            Object.values(monthlyPlans).forEach(p => { totalIncome += (parseInt(p.income)||0); totalFixed += (parseInt(p.fixed)||0); });
            Object.values(dailyExpenses).flat().forEach(e => totalDaily += (parseInt(e.amount)||0));
            const totalAssets = totalIncome - totalFixed - totalDaily;
            const percent = ((totalAssets / config.targetGoal) * 100).toFixed(1);
            document.getElementById('totalStatus').innerText = `総資産: ${totalAssets.toLocaleString()}円 (${percent}%)`;

            // 今月の予算管理
            const plan = monthlyPlans[monthKey] || { income: 0, fixed: 0, budget: 0 };
            document.getElementById('monthlyIncome').value = plan.income;
            document.getElementById('monthlyFixed').value = plan.fixed;
            document.getElementById('monthlyBudget').value = plan.budget;
            
            let monthDailyTotal = 0;
            Object.keys(dailyExpenses).forEach(date => {
                if(date.startsWith(monthKey)) dailyExpenses[date].forEach(e => monthDailyTotal += (parseInt(e.amount)||0));
            });
            const remaining = plan.budget - monthDailyTotal;
            document.getElementById('monthlyBudgetStatus').innerText = `今月の残り予算: ${remaining.toLocaleString()}円`;

            updateCalendar(y, m);
            updateList();
            updateChart();
        }

        function updateCalendar(y, m) {
            const cal = document.getElementById('calendar'); cal.innerHTML = '';
            const days = new Date(y, m + 1, 0).getDate();
            const threshold = parseInt(config.dangerThreshold) || 3000;
            
            for(let i=1; i<=days; i++){
                const d = `${y}-${(m+1).toString().padStart(2,'0')}-${i.toString().padStart(2,'0')}`;
                const dailyTotal = (dailyExpenses[d] || []).reduce((sum, e) => sum + (parseInt(e.amount)||0), 0);
                const isDanger = (dailyTotal > threshold);
                
                const div = document.createElement('div');
                div.className = 'cell ' + (isDanger ? 'cell-danger' : '');
                div.style.backgroundColor = (d === selectedDate) ? '#e3f2fd' : '';
                div.innerHTML = `${i}<br><span style="font-size:0.7em">${dailyTotal ? dailyTotal : ''}</span>`;
                div.onclick = () => { selectedDate = d; render(); };
                cal.appendChild(div);
            }
        }

        function updateList() {
            const list = document.getElementById('expenseList'); list.innerHTML = '';
            (dailyExpenses[selectedDate] || []).forEach((e, idx) => {
                list.innerHTML += `<div class="list-item">${e.item} : ${e.amount}円 <button onclick="deleteExpense(${idx})" style="width:auto; padding:2px 5px; background:red;">削除</button></div>`;
            });
        }

        function addExpense() {
            const item = document.getElementById('itemName').value;
            const amount = document.getElementById('amount').value;
            if(!item || !amount) return alert("項目と金額を入力してね");
            if(!dailyExpenses[selectedDate]) dailyExpenses[selectedDate] = [];
            dailyExpenses[selectedDate].push({item, amount});
            localStorage.setItem('dailyExpenses', JSON.stringify(dailyExpenses));
            render();
        }

        function deleteExpense(idx) {
            dailyExpenses[selectedDate].splice(idx, 1);
            localStorage.setItem('dailyExpenses', JSON.stringify(dailyExpenses));
            render();
        }

        function saveMonthlyData() {
            const monthKey = `${cur.getFullYear()}-${(cur.getMonth()+1).toString().padStart(2,'0')}`;
            monthlyPlans[monthKey] = { 
                income: parseInt(document.getElementById('monthlyIncome').value)||0, 
                fixed: parseInt(document.getElementById('monthlyFixed').value)||0,
                budget: parseInt(document.getElementById('monthlyBudget').value)||0 
            };
            localStorage.setItem('monthlyPlans', JSON.stringify(monthlyPlans));
            render();
        }

        function saveAll() {
            config.targetGoal = document.getElementById('targetGoal').value;
            config.dangerThreshold = document.getElementById('dangerThreshold').value;
            localStorage.setItem('myConfig', JSON.stringify(config));
            render();
        }
        function changeMonth(n) { cur.setDate(1); cur.setMonth(cur.getMonth() + n); render(); }
        
        function updateChart() {
            const ctx = document.getElementById('myChart').getContext('2d');
            const dates = Object.keys(dailyExpenses).sort();
            if (myChart) myChart.destroy();
            const sortedMonths = Object.keys(monthlyPlans).sort();
            const data = dates.map(d => {
                const currentMonth = d.substring(0, 7);
                let runningIncome = 0; let runningFixed = 0;
                sortedMonths.forEach(m => { if (m <= currentMonth) { runningIncome += (monthlyPlans[m].income || 0); runningFixed += (monthlyPlans[m].fixed || 0); }});
                let runningDailyExpense = 0;
                dates.forEach(date => { if (date <= d) { runningDailyExpense += dailyExpenses[date].reduce((sum, e) => sum + parseInt(e.amount), 0); } });
                return runningIncome - runningFixed - runningDailyExpense;
            });
            myChart = new Chart(ctx, { type: 'line', data: { labels: dates, datasets: [{ label: '総資産推移', data, borderColor: '#2196f3', backgroundColor: 'rgba(33, 150, 243, 0.1)', fill: true }] }, options: { responsive: true, maintainAspectRatio: false } });
        }
        
        render();
    </script>
</body>
</html>
