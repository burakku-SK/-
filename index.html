<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>濡羽の貯金管理</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f0f2f5; }
        .header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 10px; }
        .cell { background: #fff; border-radius: 4px; padding: 8px 2px; text-align: center; cursor: pointer; font-size: 0.85em; border: 1px solid #ddd; }
        .cell.today { border: 2px solid #2196f3; }
        .amount { color: #d32f2f; font-weight: bold; display: block; font-size: 0.8em; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        input, button { padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
        button { background: #4caf50; color: white; border: none; cursor: pointer; }
        #balanceDisplay { font-size: 1.2em; font-weight: bold; margin: 10px 0; color: #333; text-align: center; }
    </style>
</head>
<body>
    <div class="header">
        <button onclick="changeMonth(-1)">◀</button>
        <div id="currentMonth"></div>
        <button onclick="changeMonth(1)">▶</button>
    </div>
    <div id="calendar" class="calendar-grid"></div>
    
    <div class="controls">
        <input type="number" id="initialBalance" placeholder="初期資金" onchange="saveConfig()">
        <input type="number" id="amountInput" placeholder="本日の支出">
        <button onclick="saveData()">記録</button>
    </div>
    <div id="balanceDisplay">現在の予想資金: -</div>
    <canvas id="myChart"></canvas>

    <script>
        let currentViewDate = new Date();
        let savings = JSON.parse(localStorage.getItem('mySavings')) || {};
        let config = JSON.parse(localStorage.getItem('myConfig')) || { initialBalance: 0 };
        document.getElementById('initialBalance').value = config.initialBalance;

        function saveConfig() {
            config.initialBalance = parseInt(document.getElementById('initialBalance').value) || 0;
            localStorage.setItem('myConfig', JSON.stringify(config));
            renderCalendar();
        }

        function renderCalendar() {
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            document.getElementById('currentMonth').innerText = `${year}年 ${month + 1}月`;
            
            const cal = document.getElementById('calendar');
            cal.innerHTML = '';
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            let totalSpent = 0;
            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${year}-${(month + 1).toString().padStart(2, '0')}-${i.toString().padStart(2, '0')}`;
                const val = savings[dateStr] || 0;
                totalSpent += parseInt(val);
                
                const div = document.createElement('div');
                div.className = 'cell';
                div.innerHTML = `${i}<span class="amount">${val > 0 ? val : ''}</span>`;
                div.onclick = () => { document.getElementById('amountInput').value = val; selectedDate = dateStr; };
                cal.appendChild(div);
            }
            document.getElementById('balanceDisplay').innerText = `現在の予想資金: ${config.initialBalance - totalSpent} 円`;
            updateChart();
        }

        function updateChart() {
            const ctx = document.getElementById('myChart').getContext('2d');
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            const labels = [], data = [];
            let currentBalance = config.initialBalance;
            
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            for(let i=1; i<=daysInMonth; i++) {
                labels.push(i);
                const dateStr = `${year}-${(month+1).toString().padStart(2, '0')}-${i.toString().padStart(2, '0')}`;
                currentBalance -= (savings[dateStr] ? parseInt(savings[dateStr]) : 0);
                data.push(currentBalance);
            }

            if(window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [{ label: '資金推移', data, borderColor: '#2196f3', tension: 0.2, fill: true, backgroundColor: 'rgba(33, 150, 243, 0.1)' }] },
                options: { responsive: true }
            });
        }

        let selectedDate = new Date().toISOString().split('T')[0];
        function changeMonth(diff) { currentViewDate.setMonth(currentViewDate.getMonth() + diff); renderCalendar(); }
        function saveData() {
            savings[selectedDate] = document.getElementById('amountInput').value;
            localStorage.setItem('mySavings', JSON.stringify(savings));
            renderCalendar();
        }
        
        renderCalendar();
    </script>
</body>
</html>
