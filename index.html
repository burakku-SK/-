<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>濡羽の資産管理</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f0f2f5; }
        .header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin: 10px 0; }
        .cell { background: #fff; padding: 5px; text-align: center; border: 1px solid #ddd; font-size: 0.7em; cursor: pointer; height: 45px; position: relative;}
        .cell-fixed { background: #fff0f0; border-color: #ffcdd2; } /* 固定費は少し色を変える */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        button { padding: 8px; border-radius: 4px; border: none; background: #2196f3; color: white; cursor: pointer; }
        .info-box { background: #fff; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 0.9em; }
        .chart-wrapper { height: 250px; width: 100%; background: #fff; padding: 10px; margin-top: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <button onclick="changeMonth(-1)">◀ 前月</button>
        <div id="currentMonth"></div>
        <button onclick="changeMonth(1)">翌月 ▶</button>
    </div>
    <div class="calendar-grid" id="calendar"></div>
    
    <div class="info-box">
        <div>総資産目標: <input type="number" id="targetGoal" onchange="saveAll()" style="width:70px">円</div>
        <div id="totalStatus" style="font-weight:bold; margin-top:5px"></div>
        <hr style="margin: 10px 0;">
        <div>今月の予算設定: <input type="number" id="monthlyBudget" onchange="saveAll()" style="width:70px">円</div>
        <div id="monthStatus" style="font-weight:bold; margin-top:5px; color:#d32f2f"></div>
    </div>

    <div class="controls" style="grid-template-columns: 1fr 1fr auto;">
        <input type="number" id="amountInput" placeholder="金額(+/ -)">
        <label><input type="checkbox" id="isFixed"> 固定支出</label>
        <button onclick="saveData()" style="background:#4caf50">記録</button>
        <button onclick="exportFile()">📥保存</button>
        <button onclick="document.getElementById('fileInput').click()">📤読込</button>
        <input type="file" id="fileInput" style="display:none" onchange="importFile(event)">
    </div>
    
    <div class="chart-wrapper">
        <canvas id="myChart"></canvas>
    </div>

    <script>
        let cur = new Date();
        // 通常の支出・収入
        let savings = JSON.parse(localStorage.getItem('mySavings')) || {};
        // 固定支出
        let fixedExpenses = JSON.parse(localStorage.getItem('myFixedExpenses')) || {};
        let config = JSON.parse(localStorage.getItem('myConfig')) || { targetGoal: 1000000, monthlyBudget: 100000 };
        document.getElementById('targetGoal').value = config.targetGoal;
        document.getElementById('monthlyBudget').value = config.monthlyBudget;
        let selectedDate = new Date().toISOString().split('T')[0];

        function render() {
            const y = cur.getFullYear(), m = cur.getMonth();
            document.getElementById('currentMonth').innerText = `${y}年 ${m + 1}月`;
            const cal = document.getElementById('calendar'); cal.innerHTML = '';
            
            // 1. 総資産の計算（savings + fixedExpenses）
            let total = 0;
            [savings, fixedExpenses].forEach(obj => {
                Object.values(obj).forEach(v => { const n = parseInt(v); if (!isNaN(n)) total += n; });
            });
            const goal = parseInt(config.targetGoal) || 1;
            document.getElementById('totalStatus').innerText = `総資産: ${total}円 (目標達成率: ${((total/goal)*100).toFixed(1)}%)`;

            // 2. 今月の支出計算（savingsのみ。fixedは無視）
            let monthSpent = 0;
            const prefix = `${y}-${(m+1).toString().padStart(2,'0')}`;
            Object.keys(savings).forEach(d => {
                if(d.startsWith(prefix)) {
                    const n = parseInt(savings[d]);
                    if(!isNaN(n) && n < 0) monthSpent += Math.abs(n); 
                }
            });
            const budget = parseInt(config.monthlyBudget) || 0;
            const diff = budget - monthSpent;
            document.getElementById('monthStatus').innerText = `今月の支出(固定費除く): ${monthSpent}円 / 残り予算: ${diff}円`;

            // カレンダー構築
            const days = new Date(y, m + 1, 0).getDate();
            for(let i=1; i<=days; i++){
                const d = `${y}-${(m+1).toString().padStart(2,'0')}-${i.toString().padStart(2,'0')}`;
                const val = savings[d] !== undefined ? savings[d] : (fixedExpenses[d] !== undefined ? fixedExpenses[d] : '');
                const isFixed = fixedExpenses[d] !== undefined;
                
                const div = document.createElement('div');
                div.className = 'cell ' + (isFixed ? 'cell-fixed' : '');
                div.style.backgroundColor = (d === selectedDate) ? '#e3f2fd' : '';
                div.innerHTML = `${i}<br><span style="color:${parseInt(val)>=0?'blue':'red'}">${val}</span>`;
                div.onclick = () => { 
                    selectedDate = d; 
                    document.getElementById('amountInput').value = val || '';
                    document.getElementById('isFixed').checked = isFixed;
                    render();
                };
                cal.appendChild(div);
            }
            updateChart();
        }

        let myChart;
        function updateChart() {
            // 全データを統合してソート
            const allDates = [...new Set([...Object.keys(savings), ...Object.keys(fixedExpenses)])].sort();
            let runningTotal = 0;
            const data = allDates.map(d => {
                const val = (parseInt(savings[d]) || 0) + (parseInt(fixedExpenses[d]) || 0);
                runningTotal += val;
                return runningTotal;
            });
            
            const ctx = document.getElementById('myChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, { 
                type: 'line', 
                data: { labels: allDates, datasets: [{ label: '総資産推移', data, borderColor: '#2196f3', fill: true }] },
                options: { maintainAspectRatio: false }
            });
        }

        function saveAll() {
            config.targetGoal = document.getElementById('targetGoal').value;
            config.monthlyBudget = document.getElementById('monthlyBudget').value;
            localStorage.setItem('myConfig', JSON.stringify(config));
            render();
        }

        function saveData() {
            const val = document.getElementById('amountInput').value;
            const isFixed = document.getElementById('isFixed').checked;
            
            // 既存のデータをクリアしてから保存
            if(isFixed) {
                fixedExpenses[selectedDate] = val;
                delete savings[selectedDate];
            } else {
                savings[selectedDate] = val;
                delete fixedExpenses[selectedDate];
            }
            localStorage.setItem('mySavings', JSON.stringify(savings));
            localStorage.setItem('myFixedExpenses', JSON.stringify(fixedExpenses));
            render();
        }

        function exportFile() {
            const blob = new Blob([JSON.stringify({savings, fixedExpenses, config})], {type:'application/json'});
            const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='backup.json'; a.click();
        }

        function importFile(e) {
            const r = new FileReader();
            r.onload = (res) => {
                const d = JSON.parse(res.target.result);
                savings = d.savings || {};
                fixedExpenses = d.fixedExpenses || {};
                config = d.config || config;
                localStorage.setItem('mySavings', JSON.stringify(savings));
                localStorage.setItem('myFixedExpenses', JSON.stringify(fixedExpenses));
                localStorage.setItem('myConfig', JSON.stringify(config));
                render();
            };
            r.readAsText(e.target.files[0]);
        }
        render();
    </script>
</body>
</html>
