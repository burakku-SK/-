<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>濡羽の貯金管理</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f0f2f5; }
        .header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 20px; }
        .cell { background: #fff; border-radius: 4px; padding: 8px 2px; text-align: center; cursor: pointer; font-size: 0.85em; border: 1px solid #ddd; }
        .cell.today { border: 2px solid #2196f3; }
        .amount { color: #d32f2f; font-weight: bold; display: block; font-size: 0.8em; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 15px; }
        button { padding: 10px; background: #4caf50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        canvas { background: #fff; border-radius: 8px; padding: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <button onclick="changeMonth(-1)">◀</button>
        <div id="currentMonth"></div>
        <button onclick="changeMonth(1)">▶</button>
    </div>
    <div id="calendar" class="calendar-grid"></div>
    
    <div class="controls">
        <input type="number" id="amountInput" placeholder="金額(円)">
        <button onclick="saveData()">記録</button>
    </div>
    
    <canvas id="myChart"></canvas>

    <script>
        let currentViewDate = new Date();
        let savings = JSON.parse(localStorage.getItem('mySavings')) || {};
        let selectedDate = new Date().toISOString().split('T')[0];
        let myChart;

        function renderCalendar() {
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            document.getElementById('currentMonth').innerText = `${year}年 ${month + 1}月`;
            
            const cal = document.getElementById('calendar');
            cal.innerHTML = '';
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const todayStr = new Date().toISOString().split('T')[0];

            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${year}-${(month + 1).toString().padStart(2, '0')}-${i.toString().padStart(2, '0')}`;
                const div = document.createElement('div');
                div.className = `cell ${dateStr === todayStr ? 'today' : ''}`;
                div.innerHTML = `${i}<span class="amount">${savings[dateStr] || ''}</span>`;
                div.onclick = () => { 
                    selectedDate = dateStr; 
                    document.getElementById('amountInput').value = savings[dateStr] || ''; 
                };
                cal.appendChild(div);
            }
            updateChart();
        }

        function updateChart() {
            const ctx = document.getElementById('myChart').getContext('2d');
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            const labels = [], data = [];
            
            // 全日のデータを配列化
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            for(let i=1; i<=daysInMonth; i++) {
                labels.push(i);
                const dateStr = `${year}-${(month+1).toString().padStart(2, '0')}-${i.toString().padStart(2, '0')}`;
                data.push(savings[dateStr] ? parseInt(savings[dateStr]) : 0);
            }

            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line', // ここを line に変更
                data: { 
                    labels, 
                    datasets: [{ 
                        label: '支出推移', 
                        data, 
                        borderColor: '#4caf50', 
                        tension: 0.3,
                        fill: false 
                    }] 
                },
                options: { responsive: true, scales: { y: { beginAtZero: true } } }
            });
        }

        function changeMonth(diff) { currentViewDate.setMonth(currentViewDate.getMonth() + diff); renderCalendar(); }
        function saveData() {
            const val = document.getElementById('amountInput').value;
            if (!selectedDate || !val) return alert("日付を選択して金額を入力");
            savings[selectedDate] = val;
            localStorage.setItem('mySavings', JSON.stringify(savings));
            renderCalendar();
        }
        
        renderCalendar();
    </script>
</body>
</html>
