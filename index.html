<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>濡羽の資産管理</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f0f2f5; }
        .header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin: 10px 0; }
        .cell { background: #fff; padding: 5px; text-align: center; border: 1px solid #ddd; font-size: 0.7em; cursor: pointer; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        button { padding: 8px; border-radius: 4px; border: none; background: #2196f3; color: white; }
        .info-box { background: #fff; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 0.9em; }
        .chart-wrapper { height: 250px; width: 100%; background: #fff; padding: 10px; margin-top: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <button onclick="changeMonth(-1)">◀</button>
        <div id="currentMonth"></div>
        <button onclick="changeMonth(1)">▶</button>
    </div>
    <div class="calendar-grid" id="calendar"></div>
    
    <div class="info-box">
        <div>総資産目標: <input type="number" id="targetGoal" onchange="saveAll()" style="width:70px">円</div>
        <div id="totalStatus" style="font-weight:bold; margin-top:5px"></div>
        <hr style="margin: 10px 0;">
        <div>月間予算: <input type="number" id="monthlyBudget" onchange="saveAll()" style="width:70px">円</div>
        <div id="monthStatus" style="font-weight:bold; margin-top:5px; color:#d32f2f"></div>
    </div>

    <div class="controls">
        <input type="number" id="amountInput" placeholder="金額(+/ -)">
        <button onclick="saveData()" style="background:#4caf50">記録</button>
        <button onclick="exportFile()">📥保存</button>
        <button onclick="document.getElementById('fileInput').click()">📤読込</button>
        <input type="file" id="fileInput" style="display:none" onchange="importFile(event)">
    </div>
    
    <div class="chart-wrapper">
        <canvas id="myChart"></canvas>
    </div>

    <script>
        let cur = new Date();
        let savings = JSON.parse(localStorage.getItem('mySavings')) || {};
        let config = JSON.parse(localStorage.getItem('myConfig')) || { targetGoal: 1000000, monthlyBudget: 100000 };
        document.getElementById('targetGoal').value = config.targetGoal;
        document.getElementById('monthlyBudget').value = config.monthlyBudget;

        function render() {
            const y = cur.getFullYear(), m = cur.getMonth();
            document.getElementById('currentMonth').innerText = `${y}年 ${m + 1}月`;
            const cal = document.getElementById('calendar'); cal.innerHTML = '';
            
            // 1. 総資産の計算
            let total = 0;
            Object.values(savings).forEach(v => { const n = parseInt(v); if (!isNaN(n)) total += n; });
            const goal = parseInt(config.targetGoal) || 1;
            document.getElementById('totalStatus').innerText = `総資産: ${total}円 (達成率: ${((total/goal)*100).toFixed(1)}%)`;

            // 2. 月間予算の計算
            let monthSpent = 0;
            const prefix = `${y}-${(m+1).toString().padStart(2,'0')}`;
            Object.keys(savings).forEach(d => {
                if(d.startsWith(prefix)) {
                    const n = parseInt(savings[d]);
                    if(!isNaN(n)) monthSpent += n;
                }
            });
            const budget = parseInt(config.monthlyBudget) || 0;
            const diff = budget - monthSpent;
            document.getElementById('monthStatus').innerText = `今月収支: ${monthSpent}円 / 残り予算: ${diff}円`;

            // カレンダー構築
            const days = new Date(y, m + 1, 0).getDate();
            for(let i=1; i<=days; i++){
                const d = `${y}-${(m+1).toString().padStart(2,'0')}-${i.toString().padStart(2,'0')}`;
                const val = savings[d] || '';
                const div = document.createElement('div');
                div.className = 'cell';
                div.innerHTML = `${i}<br><span style="color:${parseInt(val)>=0?'blue':'red'}">${val}</span>`;
                div.onclick = () => { document.getElementById('amountInput').value = val; selectedDate = d; };
                cal.appendChild(div);
            }
            updateChart();
        }

        let myChart;
        function updateChart() {
            const sortedDates = Object.keys(savings).sort();
            let runningTotal = 0;
            const data = sortedDates.map(d => {
                const val = parseInt(savings[d]) || 0;
                runningTotal += val;
                return runningTotal;
            });
            const ctx = document.getElementById('myChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, { 
                type: 'line', 
                data: { labels: sortedDates, datasets: [{ label: '総資産推移', data, borderColor: '#2196f3', fill: true }] },
                options: { maintainAspectRatio: false }
            });
        }

        function saveAll() {
            config.targetGoal = document.getElementById('targetGoal').value;
            config.monthlyBudget = document.getElementById('monthlyBudget').value;
            localStorage.setItem('myConfig', JSON.stringify(config));
            render();
        }

        function saveData() {
            savings[selectedDate] = document.getElementById('amountInput').value;
            localStorage.setItem('mySavings', JSON.stringify(savings));
            render();
        }

        function exportFile() {
            const blob = new Blob([JSON.stringify({savings, config})], {type:'application/json'});
            const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='backup.json'; a.click();
        }

        function importFile(e) {
            const r = new FileReader();
            r.onload = (res) => {
                const d = JSON.parse(res.target.result);
                savings = d.savings; config = d.config;
                localStorage.setItem('mySavings', JSON.stringify(savings));
                localStorage.setItem('myConfig', JSON.stringify(config));
                render();
            };
            r.readAsText(e.target.files[0]);
        }
        
        let selectedDate = new Date().toISOString().split('T')[0];
        render();
    </script>
</body>
</html>
