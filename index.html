<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>濡羽の資産管理</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f0f2f5; }
        .header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 10px; }
        .cell { background: #fff; border-radius: 4px; padding: 8px 2px; text-align: center; cursor: pointer; font-size: 0.85em; border: 1px solid #ddd; }
        .amount { font-weight: bold; display: block; font-size: 0.8em; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        button { padding: 8px; border-radius: 4px; border: none; background: #4caf50; color: white; cursor: pointer; }
        .info-box { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: center; border: 2px solid #4caf50; }
    </style>
</head>
<body>
    <div class="header">
        <button onclick="changeMonth(-1)">◀</button>
        <div id="currentMonth"></div>
        <button onclick="changeMonth(1)">▶</button>
    </div>
    <div id="calendar" class="calendar-grid"></div>
    <div class="info-box">
        目標金額: <input type="number" id="targetGoal" style="width:80px" onchange="saveConfig()">
        <div id="progressText">達成率: 0%</div>
    </div>
    <div class="controls">
        <input type="number" id="amountInput" placeholder="金額(+/ -)">
        <button onclick="saveData()">記録</button>
        <button onclick="exportFile()" style="background:#2196f3">保存</button>
        <button onclick="document.getElementById('fileInput').click()" style="background:#2196f3">読込</button>
        <input type="file" id="fileInput" style="display:none" onchange="importFile(event)">
    </div>
    <canvas id="myChart"></canvas>

    <script>
        let currentViewDate = new Date();
        let savings = JSON.parse(localStorage.getItem('mySavings')) || {};
        let config = JSON.parse(localStorage.getItem('myConfig')) || { targetGoal: 1000000 };
        document.getElementById('targetGoal').value = config.targetGoal;

        function saveConfig() {
            config.targetGoal = parseInt(document.getElementById('targetGoal').value) || 1000000;
            localStorage.setItem('myConfig', JSON.stringify(config));
            renderCalendar();
        }

        function renderCalendar() {
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            document.getElementById('currentMonth').innerText = `${year}年 ${month + 1}月`;
            const cal = document.getElementById('calendar');
            cal.innerHTML = '';
            
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const dates = Array.from({length: daysInMonth}, (_, i) => i + 1);
            
            // 累計計算用
            let runningTotal = 0;
            dates.forEach(d => {
                const dateStr = `${year}-${(month + 1).toString().padStart(2, '0')}-${d.toString().padStart(2, '0')}`;
                runningTotal += parseInt(savings[dateStr] || 0);
            });
            const progress = ((runningTotal / config.targetGoal) * 100).toFixed(1);
            document.getElementById('progressText').innerText = `今月の資産計: ${runningTotal}円 / 達成率: ${progress}%`;

            dates.forEach(i => {
                const dateStr = `${year}-${(month + 1).toString().padStart(2, '0')}-${i.toString().padStart(2, '0')}`;
                const val = parseInt(savings[dateStr] || 0);
                const div = document.createElement('div');
                div.className = 'cell';
                div.innerHTML = `${i}<span class="amount">${val!=0?val:''}</span>`;
                div.onclick = () => { document.getElementById('amountInput').value = val; selectedDate = dateStr; };
                cal.appendChild(div);
            });
            updateChart(year, month, daysInMonth);
        }

        let myChart = null;
        function updateChart(y, m, days) {
            const ctx = document.getElementById('myChart').getContext('2d');
            const labels = Array.from({length: days}, (_, i) => i + 1);
            let total = 0;
            const data = labels.map(d => {
                const dateStr = `${y}-${(m + 1).toString().padStart(2, '0')}-${d.toString().padStart(2, '0')}`;
                total += parseInt(savings[dateStr] || 0);
                return total;
            });

            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, { type: 'line', data: { labels, datasets: [{ label: '月内資産推移', data, borderColor: '#4caf50', fill: true }] } });
        }
        
        // （他、exportFile/importFile等はそのまま維持）
        function exportFile() { const b = new Blob([JSON.stringify({savings, config})], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'data.json'; a.click(); }
        function importFile(e) { const r = new FileReader(); r.onload = (res) => { const d = JSON.parse(res.target.result); savings = d.savings; config = d.config; localStorage.setItem('mySavings', JSON.stringify(savings)); localStorage.setItem('myConfig', JSON.stringify(config)); renderCalendar(); }; r.readAsText(e.target.files[0]); }
        let selectedDate = new Date().toISOString().split('T')[0];
        function changeMonth(diff) { currentViewDate.setMonth(currentViewDate.getMonth() + diff); renderCalendar(); }
        function saveData() { savings[selectedDate] = document.getElementById('amountInput').value; localStorage.setItem('mySavings', JSON.stringify(savings)); renderCalendar(); }
        window.onload = renderCalendar;
    </script>
</body>
</html>
