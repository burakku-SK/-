<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>濡羽の資産管理</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f0f2f5; }
        .header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin: 10px 0; }
        .cell { background: #fff; padding: 5px; text-align: center; border: 1px solid #ddd; font-size: 0.7em; cursor: pointer; height: 45px; }
        .cell-fixed { background: #fff0f0; border-color: #ffcdd2; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        button { padding: 8px; border-radius: 4px; border: none; background: #2196f3; color: white; cursor: pointer; }
        .info-box { background: #fff; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 0.9em; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .chart-wrapper { height: 250px; width: 100%; background: #fff; padding: 10px; margin-top: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <button onclick="changeMonth(-1)">◀ 前月</button>
        <div id="currentMonth"></div>
        <button onclick="changeMonth(1)">翌月 ▶</button>
    </div>
    <div class="calendar-grid" id="calendar"></div>
    
    <div class="info-box">
        <div>総資産目標: <input type="number" id="targetGoal" onchange="saveAll()" style="width:70px">円</div>
        <hr style="margin: 10px 0;">
        <strong>月間収支管理</strong>
        <table>
            <tr><th>項目</th><th>金額</th></tr>
            <tr><td>月間収入</td><td><input type="number" id="monthlyIncome" style="width:80px"></td></tr>
            <tr><td>固定支出</td><td><input type="number" id="monthlyFixed" style="width:80px"></td></tr>
            <tr><td>収支残</td><td id="balanceDisplay">0</td></tr>
        </table>
        <button onclick="saveMonthlyData()" style="width:100%; margin-top:10px; background:#4caf50">収支表を保存</button>
    </div>

    <div class="controls" style="grid-template-columns: 1fr 1fr auto;">
        <input type="number" id="amountInput" placeholder="金額(+/ -)">
        <label><input type="checkbox" id="isFixed"> 固定支出</label>
        <button onclick="saveData()" style="background:#4caf50">記録</button>
        <button onclick="exportFile()">📥保存</button>
        <button onclick="document.getElementById('fileInput').click()">📤読込</button>
        <input type="file" id="fileInput" style="display:none" onchange="importFile(event)">
    </div>
    
    <div class="chart-wrapper">
        <canvas id="myChart"></canvas>
    </div>

    <script>
        let cur = new Date();
        let savings = JSON.parse(localStorage.getItem('mySavings')) || {};
        let fixedExpenses = JSON.parse(localStorage.getItem('myFixedExpenses')) || {};
        let monthlyPlans = JSON.parse(localStorage.getItem('myMonthlyPlans')) || {};
        let config = JSON.parse(localStorage.getItem('myConfig')) || { targetGoal: 1000000 };
        document.getElementById('targetGoal').value = config.targetGoal;
        let selectedDate = new Date().toISOString().split('T')[0];

        function changeMonth(n) {
            cur.setDate(1);
            cur.setMonth(cur.getMonth() + n);
            render();
        }

        function render() {
            const y = cur.getFullYear(), m = cur.getMonth();
            const monthKey = `${y}-${(m+1).toString().padStart(2,'0')}`;
            document.getElementById('currentMonth').innerText = `${y}年 ${m + 1}月`;
            const cal = document.getElementById('calendar'); cal.innerHTML = '';
            
            // 収支表の表示
            const plan = monthlyPlans[monthKey] || { income: 0, fixed: 0 };
            document.getElementById('monthlyIncome').value = plan.income;
            document.getElementById('monthlyFixed').value = plan.fixed;
            document.getElementById('balanceDisplay').innerText = (plan.income - plan.fixed);

            const days = new Date(y, m + 1, 0).getDate();
            for(let i=1; i<=days; i++){
                const d = `${y}-${(m+1).toString().padStart(2,'0')}-${i.toString().padStart(2,'0')}`;
                const val = savings[d] !== undefined ? savings[d] : (fixedExpenses[d] !== undefined ? fixedExpenses[d] : '');
                const isFixed = fixedExpenses[d] !== undefined;
                const div = document.createElement('div');
                div.className = 'cell ' + (isFixed ? 'cell-fixed' : '');
                div.style.backgroundColor = (d === selectedDate) ? '#e3f2fd' : '';
                div.innerHTML = `${i}<br><span style="color:${parseInt(val)>=0?'blue':'red'}">${val}</span>`;
                div.onclick = () => { selectedDate = d; document.getElementById('amountInput').value = val || ''; document.getElementById('isFixed').checked = isFixed; render(); };
                cal.appendChild(div);
            }
            updateChart();
        }

        function saveMonthlyData() {
            const y = cur.getFullYear(), m = cur.getMonth();
            const monthKey = `${y}-${(m+1).toString().padStart(2,'0')}`;
            monthlyPlans[monthKey] = {
                income: parseInt(document.getElementById('monthlyIncome').value) || 0,
                fixed: parseInt(document.getElementById('monthlyFixed').value) || 0
            };
            localStorage.setItem('myMonthlyPlans', JSON.stringify(monthlyPlans));
            render();
        }

        function saveAll() {
            config.targetGoal = document.getElementById('targetGoal').value;
            localStorage.setItem('myConfig', JSON.stringify(config));
            render();
        }

        function saveData() {
            const val = document.getElementById('amountInput').value;
            const isFixed = document.getElementById('isFixed').checked;
            if(isFixed) { fixedExpenses[selectedDate] = val; delete savings[selectedDate]; }
            else { savings[selectedDate] = val; delete fixedExpenses[selectedDate]; }
            localStorage.setItem('mySavings', JSON.stringify(savings));
            localStorage.setItem('myFixedExpenses', JSON.stringify(fixedExpenses));
            render();
        }

        function updateChart() {
            const allDates = [...new Set([...Object.keys(savings), ...Object.keys(fixedExpenses)])].sort();
            let runningTotal = 0;
            const data = allDates.map(d => {
                runningTotal += (parseInt(savings[d]) || 0) + (parseInt(fixedExpenses[d]) || 0);
                return runningTotal;
            });
            const ctx = document.getElementById('myChart').getContext('2d');
            if(window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, { type: 'line', data: { labels: allDates, datasets: [{ label: '総資産推移', data, borderColor: '#2196f3', fill: true }] }, options: { maintainAspectRatio: false } });
        }

        function exportFile() {
            const blob = new Blob([JSON.stringify({savings, fixedExpenses, monthlyPlans, config})], {type:'application/json'});
            const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='backup.json'; a.click();
        }

        function importFile(e) {
            const r = new FileReader();
            r.onload = (res) => {
                const d = JSON.parse(res.target.result);
                savings = d.savings || {}; fixedExpenses = d.fixedExpenses || {}; monthlyPlans = d.monthlyPlans || {}; config = d.config || config;
                localStorage.setItem('mySavings', JSON.stringify(savings));
                localStorage.setItem('myFixedExpenses', JSON.stringify(fixedExpenses));
                localStorage.setItem('myMonthlyPlans', JSON.stringify(monthlyPlans));
                localStorage.setItem('myConfig', JSON.stringify(config));
                render();
            };
            r.readAsText(e.target.files[0]);
        }
        render();
    </script>
</body>
</html>
